name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: "Image tag to build/publish (for example: sha-<commit>)"
        required: true
        type: string
      dry_run:
        description: "Build only, do not push/deploy"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Log in to GHCR
        if: ${{ inputs.dry_run == false }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: ${{ inputs.dry_run == false }}
          tags: ghcr.io/${{ github.repository }}:${{ inputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment note
        run: |
          echo "environment=${{ inputs.environment }}"
          echo "image=ghcr.io/${{ github.repository }}:${{ inputs.image_tag }}"
          echo "dry_run=${{ inputs.dry_run }}"
          echo "Use environment protection rules (required reviewers) for promotion gates."
