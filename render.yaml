services:
  - type: web
    name: pmai-web
    env: docker
    region: oregon
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_SERIALIZE
        value: "true"
      - key: LOW_MEMORY_MODE
        value: "true"
      - key: LOW_MEMORY_MAX_TRAIN_ROWS
        value: "1500"
      - key: AUTH_ENABLED
        value: "false"
