services:

  # ── Prediction API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime
    image: predictive-modeling-ai:latest
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: INFO
      LOG_SERIALIZE: "true"
      FORECAST_HORIZON: "30"
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-mlruns}
      MODEL_FILENAME: current.joblib
    env_file:
      - path: .env
        required: false          # .env is optional; env block above takes precedence
    volumes:
      - ./data:/app/data
      - ./models/artifacts:/app/models/artifacts
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── MLflow tracking server (optional — comment out if not needed) ────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.2
    profiles: ["mlflow"]
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlruns
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri /mlruns
        --default-artifact-root /mlruns
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  mlflow_data:
